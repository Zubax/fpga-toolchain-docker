# Reusable workflow: build an FPGA bitstream on a remote BuildKit builder inside
# the Zubax toolchain container. A consuming repo calls it from a tiny
# workflow_dispatch workflow and runs it locally with `act`.
#
# BuildKit variant of the remote build: no ssh/rsync — buildx talks to buildkitd
# on the build host, which reuses the mega base from its containerd store (no
# re-pull). Synthesis only; board programming stays in the project.
#
# No `actions/checkout`: these are act-only (LAN build host), so they rely on
# `act --bind`, which mounts the real project dir as the workspace — and keeps
# locally-generated, gitignored inputs present. Run any codegen locally BEFORE act.
#
# NOTE (additional path): the remote builder points at an INSECURE buildkitd
# (LAN, no TLS). If docker/setup-buildx-action rejects the plain-tcp endpoint,
# add TLS to buildkitd — or just use `make bit` (buildctl), which is the primary
# path and needs no runner at all.

name: Containerized bitstream (buildkit)

on:
  workflow_call:
    inputs:
      buildkit_endpoint:
        description: "buildkitd remote endpoint, e.g. tcp://host:1234 (set per-project — no default here)"
        required: true
        type: string
      context:
        description: "build context dir (must hold the Dockerfile)"
        required: false
        type: string
        default: '.'
      target:
        description: "Dockerfile stage to export"
        required: false
        type: string
        default: 'artifact'
      outputs:
        description: "buildx --output (e.g. type=local,dest=out or type=image,...,push=true)"
        required: false
        type: string
        default: 'type=local,dest=out'

jobs:
  bitstream:
    runs-on: ubuntu-latest
    steps:
      - name: Set up buildx (remote builder)
        uses: docker/setup-buildx-action@v4
        with:
          driver: remote
          endpoint: ${{ inputs.buildkit_endpoint }}

      - name: Build bitstream
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          target: ${{ inputs.target }}
          outputs: ${{ inputs.outputs }}
